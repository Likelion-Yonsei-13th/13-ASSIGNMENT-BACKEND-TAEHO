<!-- shop/templates/shop/product_create.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>상품 등록</title>
  <style>
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea {
      width: 300px;
    }
    .form-container {
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      padding: 20px;
      width: 500px;
    }
  </style>
</head>
<body>
  <h2>1. 상품 등록하기</h2>

  <div class="form-container">
    <h3>상품 등록</h3>
    <form method="POST">
      {% csrf_token %}
      <label for="id_name">상품명:</label>
      <input type="text" id="id_name" name="title" required>

      <label for="id_description">상품 설명:</label>
      <textarea id="id_description" name="content"></textarea>

      <label for="id_price">가격:</label>
      <input type="number" step="0.01" id="id_price" name="price" required>

      <br><br>
      <button type="submit">저장</button>
    </form>
  </div>

  <br>
  <!-- 목록 페이지로 돌아가는 링크 (URL name은 실제 프로젝트에 맞게 수정) -->
  <a href="{% url 'home' %}">← 목록으로</a>
</body>
</html>
