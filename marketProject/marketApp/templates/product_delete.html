{% extends 'base.html' %}

{% block title %}{{ post.title }} 삭제{% endblock %}

{% block content %}
  <h2>상품 제거하기</h2>

  <div class="product-card">
    <h3>상품 삭제</h3>
    <p>
      <strong>{{ post.title }}</strong> 상품을 정말 삭제하시겠습니까?
      <br>이 작업은 되돌릴 수 없습니다.
    </p>
    
    <form method="POST">
      {% csrf_token %}
      <div class="btn-area">
        <button type="submit" class="btn-delete">삭제</button>
        <a href="{% url 'home' %}" class="btn-list">목록으로</a>
      </div>
    </form>
  </div>
{% endblock %}
