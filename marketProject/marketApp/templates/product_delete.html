<!-- shop/templates/shop/product_delete.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ post.title }} 삭제</title>
  <style>
    .product-card {
      width: 500px;
      background-color: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 20px;
      margin: 20px;
    }
    .product-card h2 {
      margin-top: 0;
    }
    .btn-area {
      margin-top: 10px;
    }
    .btn-area button,
    .btn-area a {
      display: inline-block;
      margin-right: 10px;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .btn-delete { background-color: #dc3545; }
    .btn-list { background-color: #6c757d; }
  </style>
</head>
<body>
  <h2>5. 상품 제거하기</h2>

  <div class="product-card">
    <h3>상품 삭제</h3>
    <p>
      <strong>{{ post.title }}</strong> 상품을 정말 삭제하시겠습니까?
      <br>이 작업은 되돌릴 수 없습니다.
    </p>
    
    <form method="POST">
      {% csrf_token %}
      <div class="btn-area">
        <button type="submit" class="btn-delete">삭제</button>
        <a href="{% url 'home' %}" class="btn-list">목록으로</a>
      </div>
    </form>
  </div>
</body>
</html>
