{% extends "base.html" %}

{% block title %}{{ post.name }} 상세정보{% endblock %}

{% block content %}
  <h2>개별 상품 조회하기</h2>

  <div class="product-card">
    <!-- 상품명 -->
    <h2>{{ post.name }}</h2>

    <!-- 가격(아이콘 + 원 표시) -->
    <p class="price">💰 {{ post.price }}원</p>

    <!-- 상품 설명 -->
    <p>{{ post.content }}</p>

    <div class="btn-area">
      <!-- 수정 -->
      <a href="{% url 'product_edit' post.id %}" class="btn-edit">수정</a>
      <!-- 삭제 -->
      <a href="{% url 'product_delete' post.id %}" class="btn-delete">삭제</a>
      <!-- 목록으로 -->
      <a href="{% url 'home' %}" class="btn-list">목록으로</a>
    </div>
  </div>
{% endblock %}
