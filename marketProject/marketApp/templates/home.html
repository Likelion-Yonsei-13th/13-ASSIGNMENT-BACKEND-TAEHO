<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>상품 목록</title>
  <style>
    /* 간단한 테이블 스타일 예시 */
    table {
      border-collapse: collapse;
      width: 400px;
      margin-top: 10px;
    }
    th, td {
      border-bottom: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f2f2f2;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 400px;
    }
    .new-product-btn {
      text-decoration: none;
      background-color: #007bff;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
    }
    .new-product-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>상품 목록</h1>

  <div class="header">
    <!-- "+ 새 상품 등록" 버튼 -->
    <a class="new-product-btn" href="{% url 'post_create' %}">
      + 새 상품 등록
    </a>
  </div>

  <table>
    <thead>
      <tr>
        <th>상품명</th>
        <th>가격</th>
      </tr>
    </thead>
    <tbody>
      {% for post in posts %}
      <tr>
        <td>{{ post.title }}</td>
        <td>{{ post.price }}원</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2">등록된 상품이 없습니다.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
