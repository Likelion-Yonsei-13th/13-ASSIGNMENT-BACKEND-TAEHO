{% extends 'base.html' %}

{% block title %}상품 목록{% endblock %}

{% block content %}
  <h1 class="my-3">상품 목록</h1>

  <div class="mb-3">
    <a class="btn btn-primary" href="{% url 'post_create' %}">+ 새 상품 등록</a>
  </div>

  <table class="table table-bordered" style="width: 100%; max-width: 600px;">
    <thead class="table-light">
      <tr>
        <th>상품명</th>
        <th>가격</th>
        <th>등록자</th>
      </tr>
    </thead>
    <tbody>
      {% for post in posts %}
      <tr>
        <td>{{ post.title }}</td>
        <td>{{ post.price }}원</td>
        <td>{{ post.user.username }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="text-center">등록된 상품이 없습니다.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
